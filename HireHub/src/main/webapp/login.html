<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hire Hub Login</title>

<style>
body {
	font-family: Arial;
	background: #f2f6ff;
	display: flex;
	justify-content: center;
	align-items: center;
	height: 100vh;
}

.container {
	background: white;
	padding: 30px;
	width: 320px;
	border-radius: 10px;
	box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}

h2 {
	text-align: center;
	color: #2c3e50;
}

input {
	width: 100%;
	padding: 8px;
	margin-top: 10px;
	margin-bottom: 15px;
	border: 1px solid #ccc;
	border-radius: 5px;
}

button {
	width: 100%;
	padding: 10px;
	background: #2563eb;
	color: white;
	border: none;
	border-radius: 5px;
	font-size: 16px;
}

button:hover {
	background: #1e4ed8;
}
</style>

</head>

<body>

	<div class="container">

		<h2>Login</h2>

		<form action="LoginServlet" method="post">

			<label>Email</label> <input type="email" name="email" required>

			<label>Password</label> <input type="password" name="password"
				required>

			<button type="submit">Login</button>

		</form>

	</div>

</body>
</html>
