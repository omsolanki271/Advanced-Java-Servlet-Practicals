<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>View Jobs | HireHub Admin</title>

<style>
body {
	font-family: Arial;
	background: #f4f6fb;
	margin: 0;
}

.header {
	background: #1e3a8a;
	color: white;
	padding: 15px;
	text-align: center;
}

.container {
	width: 90%;
	margin: 30px auto;
}

table {
	width: 100%;
	border-collapse: collapse;
	background: white;
	box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
}

th, td {
	padding: 12px;
	text-align: center;
	border-bottom: 1px solid #ddd;
}

th {
	background: #2563eb;
	color: white;
}

tr:hover {
	background: #f1f5ff;
}

.btn-edit {
	background: #10b981;
	color: white;
	padding: 6px 12px;
	text-decoration: none;
	border-radius: 4px;
}

.btn-delete {
	background: #ef4444;
	color: white;
	padding: 6px 12px;
	text-decoration: none;
	border-radius: 4px;
}

.add-btn {
	display: inline-block;
	margin-bottom: 15px;
	background: #2563eb;
	color: white;
	padding: 10px 15px;
	text-decoration: none;
	border-radius: 5px;
}
</style>

</head>

<body>

	<div class="header">
		<h2>HireHub Admin - Manage Jobs</h2>
	</div>

	<div class="container">

		<a href="addJob.html" class="add-btn">+ Add New Job</a>

		<table>

			<tr>
				<th>ID</th>
				<th>Job Title</th>
				<th>Company</th>
				<th>Location</th>
				<th>Salary</th>
				<th>Type</th>
				<th>Actions</th>
			</tr>

			<tr>
				<td>1</td>
				<td>Java Developer</td>
				<td>TCS</td>
				<td>Ahmedabad</td>
				<td>6 LPA</td>
				<td>Full Time</td>
				<td><a href="#" class="btn-edit">Edit</a> <a href="#"
					class="btn-delete">Delete</a></td>
			</tr>

			<tr>
				<td>2</td>
				<td>Frontend Developer</td>
				<td>Infosys</td>
				<td>Pune</td>
				<td>5 LPA</td>
				<td>Full Time</td>
				<td><a href="#" class="btn-edit">Edit</a> <a href="#"
					class="btn-delete">Delete</a></td>
			</tr>

		</table>

	</div>

</body>
</html>
